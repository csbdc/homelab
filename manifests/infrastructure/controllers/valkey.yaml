apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: default
spec:
  suspend: false
  install:
    createNamespace: true
  targetNamespace: valkey-system
  interval: 10m
  chart:
    spec:
      chart: valkey
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: default
      interval: 10m
