apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: default
spec:
  install:
    createNamespace: true
  targetNamespace: metrics-server
  interval: 10m
  chart:
    spec:
      chart: metrics-server
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: default
      interval: 10m
