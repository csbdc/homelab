apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: default
spec:
  suspend: false
  install:
    createNamespace: true
  targetNamespace: redis-system
  interval: 10m
  chart:
    spec:
      chart: redis-enterprise-operator
      sourceRef:
        kind: HelmRepository
        name: redis
        namespace: default
      interval: 10m
