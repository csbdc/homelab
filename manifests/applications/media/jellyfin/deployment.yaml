apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jellyfin
  name: jellyfin-prod-media-deployment
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    rollingUpdate: 
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        fsGroup: 1000
      automountServiceAccountToken: false
      initContainers:
      - name: set-permissions
        image: alpine:latest
        command:
          - "sh"
          - "-c"
          - "tail -f /dev/null"
          # - "apk add -U libcap; capsh --print; chown -R 1000:1000 /config && chmod -R 700 /config"
        volumeMounts:
          - name: app-data
            mountPath: /
            readOnly: false
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN", "FOWNER"] 
      containers:
      - securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
        image: docker.io/jellyfin/jellyfin
        name: jellyfin
        envFrom:
        - configMapRef:
            name: jellyfin-prod-media-config
        ports:
          - containerPort: 8096
            name: http
            protocol: TCP
        resources: {}
        volumeMounts:
        - name: app-data
          mountPath: /config
          readOnly: false
        - name: tv-data
          mountPath: /tv
        - name: movies-data
          mountPath: /movies
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: jellyfin-prod-media-pvc
      - name: tv-data
        nfs:
          server: 192.168.10.197
          path: /srv/nfs/tv
      - name: movies-data
        nfs:
          server: 192.168.10.197
          path: /srv/nfs/movies