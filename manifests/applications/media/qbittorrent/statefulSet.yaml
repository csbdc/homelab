apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: qbittorrent
  name: qbittorrent-prod-media-statefulset
  namespace: media
spec:
  replicas: 3
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      automountServiceAccountToken: false
      containers:
      - securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 911
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
        image: docker.io/linuxserver/qbittorrent
        name: qbittorrent
        ports:
          - containerPort: 8080
            name: http
            protocol: TCP
          - containerPort: 6881
            protocol: TCP
          - containerPort: 6881
            protocol: UDP
        resources:
          requests:
            cpu: '0.5'
            memory: 2048Mi
        volumeMounts:
        - name: data
          mountPath: /config/qBittorrent/qBittorrent.conf
          subPath: qBittorrent.conf
        - name: downloads
          mountPath: /downloads
        - name: complete
          mountPath: /complete/          
      volumes:
      - name: data
        configMap:
          name: qbittorrent-prod-media-config
      - name: downloads
        emptyDir: {}
      - name: complete
        nfs:
          server: 192.168.10.197
          path: /srv/nfs/downloads