apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent-prod-media-ingress
  namespace: media
spec:
  ingressClassName: nginx
  rules:
  - host: "qbittorrent-1.qbittorrent.cbxon.local"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: qbittorrent-prod-media-svc
            port:
              number: 8080
  - host: "qbittorrent-2.qbittorrent.cbxon.local"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: qbittorrent-prod-media-svc
            port:
              number: 8080
  - host: "qbittorrent-3.qbittorrent.cbxon.local"
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: qbittorrent-prod-media-svc
            port:
              number: 8080