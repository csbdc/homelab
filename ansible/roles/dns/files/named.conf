options {
    directory "/var/bind";

    listen-on { any; };
    listen-on-v6 { none; };

    allow-query { any; };

    dnssec-validation no;

    forwarders {
        1.1.1.1;
        8.8.8.8;
    };

    recursion yes;
};

zone "cbxon.co.uk" {
    type master;
    file "/var/bind/zones/db.cbxon.co.uk";  # Zone file for cbxon.co.uk
};

zone "cbxon.local" {
    type master;
    file "/var/bind/zones/db.cbxon.local";  # Zone file for cbxon.local
};